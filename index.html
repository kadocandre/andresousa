<script>
  /* ---------- SCROLL POSITION MEMORY (work grid) ---------- */
  (function(){
    if('scrollRestoration' in history){ history.scrollRestoration = 'manual'; }
    const SCROLL_KEY = 'aa_workScrollY';
    const RESTORE_FLAG = 'aa_restoreWorkScroll';

    // remember where we were on the grid whenever a project card is opened
    // (delegated so it also covers cards added later, e.g. from content.json)
    document.addEventListener('click', function(e){
      if(e.target.closest('.card[href]')){
        try{ sessionStorage.setItem(SCROLL_KEY, String(window.scrollY)); }catch(err){}
      }
    });

    // only restore that position if we arrived here via a project's "back to work" link
    try{
      if(sessionStorage.getItem(RESTORE_FLAG) === '1'){
        sessionStorage.removeItem(RESTORE_FLAG);
        const y = parseInt(sessionStorage.getItem(SCROLL_KEY) || '0', 10);
        requestAnimationFrame(function(){ window.scrollTo(0, y); });
      }
    }catch(e){}
  })();

  /* ---------- SMOOTH INERTIA SCROLL ---------- */
  (function(){
    if (window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches) return;
    if ('ontouchstart' in window) return; // touch devices already have nice native momentum scroll

    let current = window.scrollY;
    let target = window.scrollY;
    const ease = 0.16; // lower = smoother/slower, higher = snappier
    const wheelMultiplier = 1.15; // a little extra energy per wheel tick
    let ticking = false;

    function maxScroll(){
      return Math.max(0, document.documentElement.scrollHeight - window.innerHeight);
    }

    function onWheel(e){
      e.preventDefault();
      target = Math.min(Math.max(target + e.deltaY * wheelMultiplier, 0), maxScroll());
      if(!ticking){ ticking = true; requestAnimationFrame(raf); }
    }

    function raf(){
      current += (target - current) * ease;
      if(Math.abs(target - current) < 0.5){
        current = target;
        window.scrollTo(0, current);
        ticking = false;
        return;
      }
      window.scrollTo(0, current);
      requestAnimationFrame(raf);
    }

    // stay in sync with scrolls we didn't cause (scrollbar drag, keyboard, back-to-top, anchor jumps, restore-on-load)
    window.addEventListener('scroll', () => {
      if(!ticking){ current = window.scrollY; target = window.scrollY; }
    }, {passive:true});

    window.addEventListener('wheel', onWheel, {passive:false});
  })();

  const topBtn = document.getElementById('topBtn');
  function toggleTopBtn(){
    if(window.scrollY > 240){ topBtn.classList.add('visible'); }
    else{ topBtn.classList.remove('visible'); }
  }
  toggleTopBtn();
  window.addEventListener('scroll', toggleTopBtn, {passive:true});

  const menuBtn = document.getElementById('menuBtn');
  const nav = document.getElementById('nav');
  function closeMenu(){
    nav.classList.remove('open');
    menuBtn.classList.remove('active');
    menuBtn.setAttribute('aria-expanded', 'false');
    menuBtn.textContent = '☰';
  }
  menuBtn.addEventListener('click', () => {
    const isOpen = nav.classList.toggle('open');
    menuBtn.classList.toggle('active', isOpen);
    menuBtn.setAttribute('aria-expanded', String(isOpen));
    menuBtn.textContent = isOpen ? '✕' : '☰';
  });
  nav.addEventListener('click', (e) => {
    if(e.target.tagName === 'A') closeMenu();
  });

  /* ---------- LUCKY BUTTON ARROW ORBIT ---------- */
  (function(){
    const spin = document.getElementById('arrowSpin');
    if(!spin) return;
    const CURSOR_SVG = '<svg viewBox="0 0 20 20" xmlns="http://www.w3.org/2000/svg"><path d="M3 2 L3 16.5 L7.1 12.4 L9.5 17.6 L11.8 16.5 L9.4 11.4 L14 11.4 Z"/></svg>';

    const RINGS = [
      { radius: 70,  count: 18 },
      { radius: 108, count: 28 },
      { radius: 146, count: 36 }
    ];

    RINGS.forEach(ring => {
      const STEP = 360 / ring.count;
      for(let i = 0; i < ring.count; i++){
        const angle = i * STEP;
        const angleRad = angle * Math.PI / 180;
        const tx = (ring.radius * Math.cos(angleRad)).toFixed(1);
        const ty = (ring.radius * Math.sin(angleRad)).toFixed(1);
        /* point the arrow tip inward, toward the button */
        const rot = Math.floor(angle + 270);
        const op = (0.5 + Math.random() * 0.25).toFixed(2);
        const sc = (0.9 + Math.random() * 0.2).toFixed(2);
        const pdur = (1.4 + Math.random() * 0.8).toFixed(2);   /* pulse loop duration */
        const pd = (Math.random() * 1.2).toFixed(2);           /* pulse phase offset, so they don't all pulse in unison */
        const el = document.createElement('div');
        el.className = 'cur' + (Math.random() < 0.16 ? ' accent' : '');
        el.style.setProperty('--tx', tx + 'px');
        el.style.setProperty('--ty', ty + 'px');
        el.style.setProperty('--rot', rot + 'deg');
        el.style.setProperty('--op', op);
        el.style.setProperty('--sc', sc);
        el.style.setProperty('--pdur', pdur + 's');
        el.style.setProperty('--pd', pd + 's');
        el.innerHTML = '<div class="cur-inner">' + CURSOR_SVG + '</div>';
        spin.appendChild(el);
      }
    });
  })();

  /* ---------- BACKGROUND TERMINAL ---------- */
  (function(){
    let cards = Array.from(document.querySelectorAll('#work .card')).filter(c => c.id !== 'terminalCard');
    const log = document.getElementById('terminalLog');
    const input = document.getElementById('terminalInput');
    if(!input) return;

    /* ---------- confirmation sound (synthesized, no audio files) ---------- */
    let audioCtx = null;
    function ensureAudio(){
      if(!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      if(audioCtx.state === 'suspended') audioCtx.resume();
    }
    function playEnterTick(){
      ensureAudio();
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.type = 'sine';
      osc.frequency.setValueAtTime(480, audioCtx.currentTime);
      osc.frequency.exponentialRampToValueAtTime(780, audioCtx.currentTime + 0.09);
      gain.gain.setValueAtTime(0.04, audioCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 0.13);
      osc.connect(gain).connect(audioCtx.destination);
      osc.start();
      osc.stop(audioCtx.currentTime + 0.13);
    }

    function buildCardData(){
      return cards.map(card => {
        const titleEl = card.querySelector('.card__title');
        const metaEl = card.querySelector('.card__meta');
        const title = titleEl ? (titleEl.childNodes[0] ? titleEl.childNodes[0].textContent.trim().toLowerCase() : '') : '';
        const meta = metaEl ? metaEl.textContent.trim().toLowerCase() : '';
        return { el: card, title, meta };
      });
    }

    let data = buildCardData();

    // re-index the terminal's searchable cards — called after project cards
    // are (re)rendered from content.json, so search/commands cover them too.
    window.refreshWorkTerminalIndex = function(){
      cards = Array.from(document.querySelectorAll('#work .card')).filter(c => c.id !== 'terminalCard');
      data = buildCardData();
    };

    let timeInterval = null;
    let timeLine = null;

    function print(text, cls){
      const p = document.createElement('p');
      if(cls === true) cls = 'hl'; // backwards-compat: print(text, true) still highlights
      if(cls) p.className = cls;
      p.textContent = text;
      log.appendChild(p);
    }

    function toggleTime(){
      if(timeInterval){
        clearInterval(timeInterval);
        timeInterval = null;
        if(timeLine){ timeLine.remove(); timeLine = null; }
        return "timer stopped";
      }
      timeLine = document.createElement('p');
      timeLine.className = 'hl';
      log.appendChild(timeLine);
      const tick = () => { if(timeLine) timeLine.textContent = new Date().toLocaleTimeString(); };
      tick();
      timeInterval = setInterval(tick, 1000);
      return "clock started";
    }

    let prideInterval = null;
    let prideHue = 0;
    function togglePride(){
      const root = document.documentElement;
      // SVG shapes that use hardcoded ink colors instead of currentColor
      // (the icons/logo already use currentColor and will follow --ink automatically)
      const prideShapes = document.querySelectorAll(
        'svg [fill="#1a1a1a"], svg [fill="#3a3a3a"], svg [fill="#9a9a96"], svg [stroke="#c9c9c5"]'
      );

      if(prideInterval){
        clearInterval(prideInterval);
        prideInterval = null;
        root.style.removeProperty('--accent');
        root.style.removeProperty('--ink');
        root.style.removeProperty('--grey');
        prideShapes.forEach(el => { el.style.fill = ''; el.style.stroke = ''; });
        return "back to normal";
      }

      prideInterval = setInterval(() => {
        prideHue = (prideHue + 2) % 360;
        const main = `hsl(${prideHue}, 90%, 60%)`;
        const soft = `hsl(${prideHue}, 60%, 70%)`;
        root.style.setProperty('--accent', main);
        root.style.setProperty('--ink', main);
        root.style.setProperty('--grey', soft);
        prideShapes.forEach(el => {
          if(el.hasAttribute('fill')) el.style.fill = main;
          if(el.hasAttribute('stroke')) el.style.stroke = main;
        });
      }, 30);
      return "🌈 pride mode on";
    }

    const PARTY_COLORS = ['#ff6ec7','#ffd166','#8ee3ff','#b28dff','#7dffb3','#ff9770','#c1fffa','#ffa8e3','#fff07c'];

    function triggerParty(){
      const count = 140;
      const frag = document.createDocumentFragment();
      const toRemove = [];

      for(let i = 0; i < count; i++){
        const el = document.createElement('div');
        el.className = 'confetti-piece';

        const size = 6 + Math.random() * 8;
        const isCircle = Math.random() < 0.35;
        const duration = (2.4 + Math.random() * 1.8);
        const delay = Math.random() * 0.6;
        const spin = (Math.floor(Math.random() * 3 + 2) * 360) * (Math.random() < 0.5 ? -1 : 1);
        const drift = Math.random() * 220 - 110;
        const color = PARTY_COLORS[Math.floor(Math.random() * PARTY_COLORS.length)];

        el.style.left = (Math.random() * 100) + 'vw';
        el.style.width = size + 'px';
        el.style.height = (isCircle ? size : size * 1.6) + 'px';
        el.style.background = color;
        el.style.borderRadius = isCircle ? '50%' : '2px';
        el.style.setProperty('--drift', drift + 'px');
        el.style.setProperty('--spin', spin + 'deg');
        el.style.animationDuration = duration + 's';
        el.style.animationDelay = delay + 's';

        frag.appendChild(el);
        toRemove.push([el, (duration + delay) * 1000 + 100]);
      }

      document.body.appendChild(frag);
      toRemove.forEach(([el, ms]) => setTimeout(() => el.remove(), ms));
      return "🎉 party time";
    }
    window.triggerParty = triggerParty; // expose so the Aug 10 auto-trigger script can call it

    const RANDOM_PROPS = ['--accent','--paper','--ink','--tile','--line','--grey','--card-radius','--body-weight','--body-ls'];

    function resetRandom(){
      RANDOM_PROPS.forEach(p => document.documentElement.style.removeProperty(p));
    }

    function triggerRandom(){
      const root = document.documentElement;
      const accentHue = Math.floor(Math.random() * 360);
      const bgHue = Math.floor((accentHue + 20 + Math.random() * 40) % 360);
      const dark = Math.random() < 0.3;

      const accent = `hsl(${accentHue}, ${Math.floor(65 + Math.random() * 20)}%, ${Math.floor(48 + Math.random() * 10)}%)`;
      const paper = dark
        ? `hsl(${bgHue}, ${Math.floor(10 + Math.random() * 10)}%, ${Math.floor(8 + Math.random() * 8)}%)`
        : `hsl(${bgHue}, ${Math.floor(15 + Math.random() * 20)}%, ${Math.floor(94 + Math.random() * 4)}%)`;
      const ink = dark
        ? `hsl(${bgHue}, ${Math.floor(10 + Math.random() * 15)}%, ${Math.floor(88 + Math.random() * 8)}%)`
        : `hsl(${bgHue}, ${Math.floor(20 + Math.random() * 15)}%, ${Math.floor(10 + Math.random() * 10)}%)`;
      const tile = dark
        ? `hsl(${bgHue}, ${Math.floor(10 + Math.random() * 10)}%, ${Math.floor(16 + Math.random() * 8)}%)`
        : `hsl(${bgHue}, ${Math.floor(15 + Math.random() * 15)}%, ${Math.floor(90 + Math.random() * 5)}%)`;
      const line = dark
        ? `hsl(${bgHue}, ${Math.floor(10 + Math.random() * 10)}%, ${Math.floor(26 + Math.random() * 8)}%)`
        : `hsl(${bgHue}, ${Math.floor(10 + Math.random() * 15)}%, ${Math.floor(85 + Math.random() * 6)}%)`;
      const grey = dark
        ? `hsl(${bgHue}, 8%, ${Math.floor(60 + Math.random() * 10)}%)`
        : `hsl(${bgHue}, 8%, ${Math.floor(42 + Math.random() * 10)}%)`;

      root.style.setProperty('--accent', accent);
      root.style.setProperty('--paper', paper);
      root.style.setProperty('--ink', ink);
      root.style.setProperty('--tile', tile);
      root.style.setProperty('--line', line);
      root.style.setProperty('--grey', grey);

      root.style.setProperty('--card-radius', Math.floor(Math.random() * 26) + 'px');
      root.style.setProperty('--body-weight', [500, 600, 700][Math.floor(Math.random() * 3)]);
      root.style.setProperty('--body-ls', (Math.random() * 0.06).toFixed(3) + 'em');

      return "🎲 rerolled the design — run it again for another, or 'clear' to reset";
    }

    let gravityFallen = false;

    function toggleGravity(){
      if(reducedMotion()) return "skipping gravity — reduced motion is on";
      const projectCards = document.querySelectorAll('#work .card:not(#terminalCard)');
      const staggerStep = 0.05;

      if(gravityFallen){
        projectCards.forEach((c, i) => {
          c.classList.remove('falling');
          c.style.animationDelay = (i * staggerStep) + 's';
          c.classList.add('rising');
        });
        const riseComplete = (projectCards.length * staggerStep) + 0.7;
        setTimeout(() => {
          projectCards.forEach(c => {
            c.classList.remove('rising');
            c.style.animationDelay = '';
            c.style.removeProperty('--fall-y');
            c.style.removeProperty('--fall-x');
            c.style.removeProperty('--fall-rot');
          });
        }, riseComplete * 1000);
        gravityFallen = false;
        return "gravity restored";
      }

      const viewportBottom = window.scrollY + window.innerHeight;
      projectCards.forEach((c, i) => {
        c.classList.remove('rising');
        void c.offsetWidth; // restart animation cleanly

        const rect = c.getBoundingClientRect();
        const cardBottom = window.scrollY + rect.bottom;
        const fallDistance = Math.max(40, viewportBottom - cardBottom - 24);
        const drift = Math.random() * 60 - 30;
        const spin = Math.random() * 16 - 8;

        c.style.setProperty('--fall-y', fallDistance + 'px');
        c.style.setProperty('--fall-x', drift + 'px');
        c.style.setProperty('--fall-rot', spin + 'deg');
        c.style.animationDelay = (i * staggerStep) + 's';
        c.classList.add('falling');
      });
      gravityFallen = true;
      return "whoa — gravity kicked in. run 'gravity' again to bring them back";
    }

    function reducedMotion(){
      return window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;
    }

    function triggerShake(){
      if(reducedMotion()) return "skipping the shake — reduced motion is on";
      const projectCards = document.querySelectorAll('#work .card');
      projectCards.forEach((c, i) => {
        c.classList.remove('shaking');
        void c.offsetWidth; // restart animation if run twice quickly
        c.style.animationDelay = (i * 0.03) + 's';
        c.classList.add('shaking');
      });
      setTimeout(() => {
        projectCards.forEach(c => { c.classList.remove('shaking'); c.style.animationDelay = ''; });
      }, 700 + projectCards.length * 30);
      return "rattling the cards";
    }

    function triggerFlip(){
      if(reducedMotion()) return "skipping the flip — reduced motion is on";
      const projectCards = document.querySelectorAll('#work .card');
      projectCards.forEach((c, i) => {
        c.classList.remove('flipping');
        void c.offsetWidth;
        c.style.animationDelay = (i * 0.05) + 's';
        c.classList.add('flipping');
      });
      setTimeout(() => {
        projectCards.forEach(c => { c.classList.remove('flipping'); c.style.animationDelay = ''; });
      }, 900 + projectCards.length * 50);
      return "flipping the cards";
    }

    let snowInterval = null;

    function spawnSnowflake(){
      const el = document.createElement('div');
      el.className = 'snowflake-piece';
      const size = 4 + Math.random() * 6;
      const duration = 6 + Math.random() * 6;
      const drift = Math.random() * 160 - 80;
      const sway = 20 + Math.random() * 40;

      el.style.left = (Math.random() * 100) + 'vw';
      el.style.width = size + 'px';
      el.style.height = size + 'px';
      el.style.opacity = (0.4 + Math.random() * 0.5).toFixed(2);
      el.style.setProperty('--drift', drift + 'px');
      el.style.setProperty('--sway', sway + 'px');
      el.style.animationDuration = duration + 's';

      document.body.appendChild(el);
      setTimeout(() => el.remove(), duration * 1000 + 100);
    }

    function toggleSnow(){
      if(snowInterval){
        clearInterval(snowInterval);
        snowInterval = null;
        return "snow stopped";
      }
      if(reducedMotion()) return "skipping snow — reduced motion is on";
      snowInterval = setInterval(spawnSnowflake, 220);
      spawnSnowflake();
      return "❄️ let it snow";
    }

    function triggerJump(){
      if(reducedMotion()) return "skipping the jump — reduced motion is on";
      const projectCards = document.querySelectorAll('#work .card:not(#terminalCard)');
      projectCards.forEach((c, i) => {
        c.classList.remove('jumping');
        void c.offsetWidth; // restart animation if run twice quickly
        c.style.animationDelay = (i * 0.08) + 's';
        c.classList.add('jumping');
      });
      setTimeout(() => {
        projectCards.forEach(c => { c.classList.remove('jumping'); c.style.animationDelay = ''; });
      }, 1100 + projectCards.length * 80);
      return "boing!";
    }

    function resetAllEffects(){
      // clock
      if(timeInterval){ clearInterval(timeInterval); timeInterval = null; timeLine = null; }

      // pride mode
      if(prideInterval){ clearInterval(prideInterval); prideInterval = null; }
      document.documentElement.style.removeProperty('--accent');
      document.documentElement.style.removeProperty('--ink');
      document.documentElement.style.removeProperty('--grey');
      document.querySelectorAll('svg [fill], svg [stroke]').forEach(el => { el.style.fill = ''; el.style.stroke = ''; });

      // snow
      if(snowInterval){ clearInterval(snowInterval); snowInterval = null; }
      document.querySelectorAll('.snowflake-piece').forEach(el => el.remove());

      // leftover party confetti
      document.querySelectorAll('.confetti-piece').forEach(el => el.remove());

      // randomized design tokens
      resetRandom();

      // gravity + any in-flight one-shot animations (shake, flip, jump, gravity, search dim)
      gravityFallen = false;
      document.querySelectorAll('#work .card').forEach(c => {
        c.classList.remove('shaking', 'flipping', 'jumping', 'falling', 'rising', 'dim');
        c.style.animationDelay = '';
        c.style.removeProperty('--fall-y');
        c.style.removeProperty('--fall-x');
        c.style.removeProperty('--fall-rot');
      });
    }

    const COFFEE_ART = `        ..
     ..    ..
           ..
            ..
            ..
           ..
         ..
##              ####
##.............##  ##
##.............##   ##
##.............## ##
##.............###
  ##...........##
   #############
   #############
#################`;

    const COMMANDS = {
      help: () => "commands: date, time, jump, coffee, pride, party, shake, flip, snow, random, gravity, clear — or just search",
      sudo: () => "nice try",
      hello: () => "hey — try searching a project",
      date: () => new Date().toLocaleDateString(undefined, { weekday:'long', year:'numeric', month:'long', day:'numeric' }),
      time: toggleTime,
      jump: triggerJump,
      pride: togglePride,
      party: triggerParty,
      shake: triggerShake,
      flip: triggerFlip,
      snow: toggleSnow,
      random: triggerRandom,
      gravity: toggleGravity,
      coffee: () => ({ text: COFFEE_ART, cls: 'ascii' })
    };

    function filter(query){
      const q = query.trim().toLowerCase();
      if(!q){
        cards.forEach(c => c.classList.remove('dim'));
        return -1;
      }
      let matched = 0;
      data.forEach(d => {
        const isMatch = d.title.includes(q) || d.meta.includes(q);
        d.el.classList.toggle('dim', !isMatch);
        if(isMatch) matched++;
      });
      return matched;
    }

    input.addEventListener('input', () => {
      filter(input.value);
    });

    input.addEventListener('keydown', (e) => {
      if(e.key !== 'Enter') return;
      const raw = input.value.trim();
      const q = raw.toLowerCase();
      if(!q) return;

      playEnterTick();

      if(q === 'clear'){
        log.innerHTML = '';
        resetAllEffects();
        input.value = '';
        return;
      }

      if(q !== 'time' && timeInterval){
        clearInterval(timeInterval);
        timeInterval = null;
        timeLine = null;
      }
      log.innerHTML = '';

      print('> ' + raw);
      if(COMMANDS[q]){
        cards.forEach(c => c.classList.remove('dim'));
        const result = COMMANDS[q]();
        if(result && typeof result === 'object'){
          print(result.text, result.cls);
        } else {
          print(result);
        }
      } else {
        const matched = filter(raw);
        if(matched > 0){
          const first = data.find(d => d.title.includes(q) || d.meta.includes(q));
          if(first) first.el.scrollIntoView({behavior:'smooth', block:'center'});
          print('found it — scrolled you there', true);
        } else {
          print('no matches. try: ' + data.map(d => d.title).join(', '));
        }
      }
      input.value = '';
    });

    document.addEventListener('click', (e) => {
      if(!e.target.closest('#terminalCard')){
        cards.forEach(c => c.classList.remove('dim'));
      }
    });
  })();
</script>

<!-- ============ LOADER SCRIPT ============ -->
<script>
(function(){
  var loader = document.getElementById('loader');
  var lines = document.querySelectorAll('.loader-line');

  // ---- build the stair-column curtain backdrop ----
  var COLS = 10;
  var COL_DELAY_MS = 55;
  var COL_DURATION_MS = 640;
  var curtain = document.getElementById('loader-curtain');
  var cols = [];
  for (var c = 0; c < COLS; c++) {
    var col = document.createElement('span');
    col.className = 'curtain-col';
    col.style.setProperty('--i', c);
    curtain.appendChild(col);
    cols.push(col);
  }

  // ---- throttle: only show the animation once per hour ----
  var STORAGE_KEY = 'loaderLastShown';
  var COOLDOWN_MS = 60 * 60 * 1000; // 1 hour
  var now = Date.now();
  var lastShown = parseInt(localStorage.getItem(STORAGE_KEY), 10);
  var withinCooldown = lastShown && (now - lastShown) < COOLDOWN_MS;

  if (withinCooldown) {
    // skip the big curtain/logo intro
    loader.classList.add('hide', 'hide-instant');
    loader.style.display = 'none';
    return;
  }

  // record this run so the animation is skipped next time within the hour
  localStorage.setItem(STORAGE_KEY, String(now));

  // reveal page (curtain) then fully hide loader from layout
  window.hideLoader = function(){
    // wait for the last (slowest) column to finish rising before removing
    // the loader from layout
    var lastCol = cols[cols.length - 1];
    var done = function(e){
      if (e && e.target !== lastCol) return;
      lastCol.removeEventListener('transitionend', done);
      loader.classList.add('hide-instant');
      loader.style.display = 'none';
    };

    // double rAF: let the browser finish any pending style/layout work from
    // the logo-fill animation ending before we kick off 11 new transitions
    // in the same tick — starting them mid-frame is what causes the
    // stutter/fps-drop right at the beginning of the transition.
    requestAnimationFrame(function(){
      requestAnimationFrame(function(){
        loader.classList.add('hide');
        lastCol.addEventListener('transitionend', done);
        // fallback in case transitionend doesn't fire (e.g. animations disabled)
        var totalMs = (COLS - 1) * COL_DELAY_MS + COL_DURATION_MS + 150;
        setTimeout(done, totalMs);
      });
    });
  };

  var logoFillWrap = document.getElementById('logoFillWrap');
  var logoFillSvg = document.getElementById('logoFillSvg');

  // the moment the left-to-right fill finishes (100%), enter the transition
  logoFillSvg.addEventListener('animationend', function(){
    window.hideLoader();
  }, { once: true });

  function startFill(){
    lines[0].classList.add('in');
    setTimeout(function(){ logoFillWrap.classList.add('filling'); }, 150);
  }

  // start the fill once the page has fully loaded
  if (document.readyState === 'complete') {
    startFill();
  } else {
    window.addEventListener('load', startFill);
  }
})();
</script>

<!-- ============ PROJECT PARALLAX ON HOVER ============ -->
<script>
(function(){
  var mq = window.matchMedia('(hover: none), (pointer: coarse)');
  if (mq.matches) return; // skip on touch devices

  var MAX_TILT = 6;   // degrees, for a "reference" card width
  var REFERENCE_WIDTH = 280; // px - tilt is scaled down for cards wider than this
  var SCALE = 1.02;

  var IMG_STRENGTH = 14; // max px the inner image shifts
  var IMG_SCALE = 1.08;  // headroom so the image edges never show while it shifts

  function attachParallax(card){
    if (card.__parallaxAttached) return;
    card.__parallaxAttached = true;

    var frame = card.querySelector('.card__frame');
    var visual = frame ? frame.querySelector('img, svg') : null;

    card.addEventListener('mouseenter', function(){
      card.classList.add('tilting');
    });

    card.addEventListener('mousemove', function(e){
      var rect = card.getBoundingClientRect();
      var sizeFactor = Math.min(1, REFERENCE_WIDTH / rect.width);
      var tilt = MAX_TILT * sizeFactor;
      var px = (e.clientX - rect.left) / rect.width - 0.5;
      var py = (e.clientY - rect.top) / rect.height - 0.5;
      var rotateY = px * tilt;
      var rotateX = -py * tilt;
      card.style.transform = 'perspective(1400px) rotateX(' + rotateX + 'deg) rotateY(' + rotateY + 'deg)';

      if (visual && frame) {
        var frect = frame.getBoundingClientRect();
        var fpx = (e.clientX - frect.left) / frect.width - 0.5;
        var fpy = (e.clientY - frect.top) / frect.height - 0.5;
        var moveX = fpx * IMG_STRENGTH;
        var moveY = fpy * IMG_STRENGTH;
        visual.style.transform = 'scale(' + IMG_SCALE + ') translate(' + moveX + 'px,' + moveY + 'px)';
      }
    });

    card.addEventListener('mouseleave', function(){
      card.classList.remove('tilting');
      card.style.transform = '';
      if (visual) visual.style.transform = '';
    });
  }

  document.querySelectorAll('a.card').forEach(attachParallax);

  // exposed so cards rendered later from content.json get the same hover effect
  window.attachWorkCardParallax = attachParallax;
})();
</script>
<!-- ============ END PROJECT PARALLAX ============ -->

<!-- ============ PROJECT DATA LOADER (content.json) ============ -->
<!-- Renders the "projects" array from content.json:                             -->
<!--  - the most recent project (highest "year"; ties go to whichever appears    -->
<!--    later in the array) is shown as a full-width featured card.              -->
<!--  - the rest fill rows that alternate between 4 and 5 columns, sorted by    -->
<!--    year descending (most recent on top, ties keep content.json order) —  -->
<!--    no randomness, nothing reshuffles on refresh. The 1st slot of the 1st  -->
<!--    row is always the search terminal.                                    -->
<!--  - add "span": 2 or "span": 3 to any project to make it wider.              -->
<!--  - insert `{ "empty": true }` (optionally with its own "span") anywhere in  -->
<!--    the array to force a blank slot at that exact position.                 -->
<!-- Every card uses: thumbnailimage -> card__frame img, title -> card__title,   -->
<!-- role -> card__meta. Edit content.json and these update — no HTML needed.    -->
<script>
(function(){
  var ARROW_SVG = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" focusable="false"><path d="M7 17L17 7"/><path d="M7 7H17V17"/></svg>';

  function escapeHtml(str){
    return String(str == null ? '' : str).replace(/[&<>"']/g, function(ch){
      return { '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;' }[ch];
    });
  }

  // `span` (2 or 3) makes a card the "wide" one in its row; omit for a normal 1-col card.
  function cardMarkup(project, index, span){
    var title = escapeHtml(project.title);
    var role = escapeHtml(project.role);
    var media = MediaEmbed.markup(project.thumbnailimage, project.title, { muted: true, loop: true, controls: false });
    var styleAttr = span && span > 1 ? ' style="grid-column: span ' + span + ';"' : '';
    // Single-slot grid cards (explicit span === 1) keep the thumbnail's original
    // aspect ratio (letterboxed, not cropped/stretched). The featured hero card
    // (span omitted) and wide cards (span 2/3) still fill their slot as before.
    var frameClass = (span === 1) ? 'card__frame fit' : 'card__frame';

    return (
      '<a href="project.html?id=' + index + '" class="card project-card"' + styleAttr + ' data-project-index="' + index + '">' +
        '<div class="' + frameClass + '">' +
          media +
        '</div>' +
        '<div class="card__info">' +
          '<p class="card__title">' + title + '<span class="card__arrow">' + ARROW_SVG + '</span></p>' +
          '<p class="card__meta">' + role + '</p>' +
        '</div>' +
      '</a>'
    );
  }

  // Occupies `span` grid slot(s) but shows nothing — keeps row rhythm/height
  // consistent. Controlled from content.json via `{ "empty": true, "span": N }`.
  function emptySlotMarkup(span){
    var styleAttr = span && span > 1 ? ' style="grid-column: span ' + span + ';"' : '';
    return (
      '<div class="grid-empty-slot"' + styleAttr + ' aria-hidden="true">' +
        '<div class="card__frame"></div>' +
        '<div class="card__info"><p class="card__title">&nbsp;</p><p class="card__meta">&nbsp;</p></div>' +
      '</div>'
    );
  }

  // Placeholder for the search terminal's 1st-row, 1st-slot spot. The real
  // #terminalCard node (with its already-bound input/log listeners) gets
  // swapped in for this element after the rows are rendered — see
  // renderProjects() below.
  function terminalSlotMarkup(){
    return '<div class="card" data-terminal-slot></div>';
  }

  // Splits `entries` (already in the exact order they should appear, each
  // `{ p, i, span }` or `{ empty: true, span }`) into rows that alternate
  // between 4 and 5 columns. Entries are packed in order — nothing is
  // shuffled or randomized, so refreshing the page never reshuffles the
  // grid. If an entry's span doesn't fit in what's left of the current row,
  // it rolls to the next row instead of being resized, and any leftover
  // room in a row is padded with blank slots so row heights stay consistent.
  // The very first row always starts with the search terminal in slot 1.
  function buildDynamicRows(entries){
    var rows = [];
    var colsCycle = [4, 5];
    var idx = 0;
    var rowIndex = 0;

    while (idx < entries.length || rowIndex === 0){
      var cols = colsCycle[rowIndex % colsCycle.length];
      var cells = [];
      var used = 0;

      if (rowIndex === 0){
        cells.push({ type: 'terminal', span: 1 });
        used = 1;
      }

      while (idx < entries.length){
        var entry = entries[idx];
        var span = Math.max(1, Math.min(entry.span || 1, cols));
        if (span > cols - used) break; // doesn't fit — roll to next row
        cells.push({
          type: entry.empty ? 'empty' : 'normal',
          span: span,
          entry: entry.empty ? null : entry
        });
        used += span;
        idx++;
      }

      while (used < cols){
        cells.push({ type: 'empty', span: 1 });
        used++;
      }

      rows.push({ cols: cols, cells: cells });
      rowIndex++;
    }

    return rows;
  }

  function rowMarkup(row){
    var cellsHtml = row.cells.map(function(cell){
      if (cell.type === 'terminal') return terminalSlotMarkup();
      if (cell.type === 'empty') return emptySlotMarkup(cell.span);
      return cardMarkup(cell.entry.p, cell.entry.i, cell.span);
    }).join('');
    var rowClass = row.cols === 5 ? 'grid-row--5' : 'grid-row--4';
    return '<div class="grid-row ' + rowClass + '">' + cellsHtml + '</div>';
  }

  function showError(message){
    var err = document.getElementById('projectsError');
    if (!err) return;
    err.textContent = message;
    err.style.display = 'block';
  }

  function renderProjects(projects){
    var featuredRow = document.getElementById('featuredProjectRow');
    var rowsContainer = document.getElementById('dynamicProjectRows');
    if (!featuredRow || !rowsContainer) return;

    if (!projects.length){
      showError('No projects found in content.json yet.');
      return;
    }

    // Find the featured project: highest "year" wins; ties go to whichever
    // appears later in the array. `{ "empty": true }` placeholder objects are
    // never eligible to be featured.
    var featuredIdx = -1;
    var featuredYear = -Infinity;
    projects.forEach(function(p, i){
      if (p && p.empty) return;
      var y = parseInt(p.year, 10);
      if (isNaN(y)) y = 0;
      if (y >= featuredYear){ featuredYear = y; featuredIdx = i; }
    });

    if (featuredIdx === -1){
      showError('No projects found in content.json yet.');
      return;
    }

    // Everything else is sorted by year, most recent first (ties keep their
    // original content.json order). Add "span": 2 or "span": 3 to a project
    // to make it wider, or insert `{ "empty": true }` (optionally with its
    // own "span") anywhere in the array to force a blank slot. An empty slot
    // with no "year" of its own inherits the year of the nearest real project
    // next to it in the file, so it sorts along with that project instead of
    // sinking to the bottom — give it an explicit "year" to pin it exactly.
    var effectiveYear = projects.map(function(p){
      if (p && p.empty && p.year === undefined) return null;
      var y = parseInt(p.year, 10);
      return isNaN(y) ? null : y;
    });
    for (var k = effectiveYear.length - 2; k >= 0; k--){
      if (effectiveYear[k] === null) effectiveYear[k] = effectiveYear[k + 1];
    }
    for (var k2 = 1; k2 < effectiveYear.length; k2++){
      if (effectiveYear[k2] === null) effectiveYear[k2] = effectiveYear[k2 - 1];
    }

    var rest = [];
    projects.forEach(function(p, i){
      if (i === featuredIdx) return;
      var year = effectiveYear[i] === null ? 0 : effectiveYear[i];
      if (p && p.empty){
        rest.push({ empty: true, span: p.span || 1, year: year, i: i });
      } else {
        rest.push({ p: p, i: i, span: p.span || 1, year: year });
      }
    });
    rest.sort(function(a, b){
      if (b.year !== a.year) return b.year - a.year;
      return b.i - a.i; // tie -> whichever sits lower in content.json counts as more recent
    });

    featuredRow.innerHTML = cardMarkup(projects[featuredIdx], featuredIdx);
    rowsContainer.innerHTML = buildDynamicRows(rest).map(rowMarkup).join('');

    // Swap the real #terminalCard node (already wired up with its input/log
    // listeners) into the placeholder reserved for it in the 1st row.
    var terminalCard = document.getElementById('terminalCard');
    var terminalSlot = rowsContainer.querySelector('[data-terminal-slot]');
    if (terminalCard && terminalSlot){
      terminalSlot.replaceWith(terminalCard);
    }

    // wire up the same hover/tilt effect the rest of the cards have
    if (window.attachWorkCardParallax){
      document.querySelectorAll('#featuredProjectRow a.card, #dynamicProjectRows a.card').forEach(window.attachWorkCardParallax);
    }
    // wire up the "see project" cursor label too
    if (window.attachWorkCardHoverLabel){
      document.querySelectorAll('#featuredProjectRow a.card, #dynamicProjectRows a.card').forEach(window.attachWorkCardHoverLabel);
    }
    // let the terminal's search/commands know about the new cards
    if (window.refreshWorkTerminalIndex){
      window.refreshWorkTerminalIndex();
    }

  }

  fetch('content.json')
    .then(function(res){
      if (!res.ok) throw new Error('content.json responded with ' + res.status);
      return res.json();
    })
    .then(function(json){ renderProjects(json.projects || []); })
    .catch(function(err){
      console.error('Could not load projects from content.json:', err);
      // Most common cause: this page was opened directly as a file (file://...)
      // instead of through a local server — browsers block fetch() for local
      // files in that case. Serve the folder (e.g. `python3 -m http.server`
      // or a "Live Server" extension) and reload.
      showError('Could not load projects — if you opened this file directly (file://…), serve it from a local web server instead (e.g. `python3 -m http.server`) and reload.');
      // Projects failed to load, so there's no grid row to place the terminal
      // into — reveal it on its own rather than leaving it stranded hidden.
      var terminalHome = document.getElementById('terminalHome');
      if (terminalHome) terminalHome.style.display = '';
    });
})();
</script>
<!-- ============ END PROJECT DATA LOADER ============ -->

</body>
</html>
