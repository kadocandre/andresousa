<script>
(async function(){
if('scrollRestoration' in history){ history.scrollRestoration = 'manual'; }
/* ---------------- mobile menu ---------------- */
const menuBtn = document.getElementById('menuBtn');
const nav = document.getElementById('nav');
function closeMenu(){
  nav.classList.remove('open');
  menuBtn.classList.remove('active');
  menuBtn.setAttribute('aria-expanded', 'false');
  menuBtn.textContent = '☰';
}
menuBtn.addEventListener('click', () => {
  const isOpen = nav.classList.toggle('open');
  menuBtn.classList.toggle('active', isOpen);
  menuBtn.setAttribute('aria-expanded', String(isOpen));
  menuBtn.textContent = isOpen ? '✕' : '☰';
});
nav.addEventListener('click', (e) => {
  if(e.target.tagName === 'A') closeMenu();
});

/* ---------------- sound design (synthesized, no audio files) ---------------- */
let audioCtx = null;

function ensureAudio(){
  if(!audioCtx){
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  }
  if(audioCtx.state === 'suspended') audioCtx.resume();
}

function playTone(freq, duration, type, volume){
  ensureAudio();
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = type || 'sine';
  osc.frequency.value = freq;
  gain.gain.setValueAtTime(volume || 0.05, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + duration);
  osc.connect(gain).connect(audioCtx.destination);
  osc.start();
  osc.stop(audioCtx.currentTime + duration);
}

function playBounce(){ playTone(320, 0.09, 'triangle', 0.013); }

/* ---------------- svg tile artwork ---------------- */
function svgTile(seed){
  const palettes = [
    ['#1a1a1a','#eae9e6'], ['#e05a2b','#ffffff'], ['#eae9e6','#3a3a3a'],
    ['#111111','#f0f0ee'], ['#c9c9c5','#1a1a1a'], ['#e05a2b','#111111']
  ];
  const [bg,fg] = palettes[seed % palettes.length];
  const shapes = [
    `<circle cx="100" cy="100" r="60" fill="${fg}"/>`,
    `<rect x="30" y="30" width="140" height="140" fill="${fg}"/>`,
    `<rect x="40" y="60" width="120" height="30" fill="${fg}"/><rect x="60" y="110" width="80" height="30" fill="${fg}"/>`,
    `<circle cx="70" cy="70" r="26" fill="${fg}"/><circle cx="130" cy="130" r="34" fill="${fg}"/>`,
    `<path d="M20 180 L100 20 L180 180 Z" fill="${fg}"/>`,
    `<line x1="20" y1="20" x2="180" y2="180" stroke="${fg}" stroke-width="14"/><line x1="180" y1="20" x2="20" y2="180" stroke="${fg}" stroke-width="14"/>`
  ];
  const shape = shapes[(seed*3) % shapes.length];
  return `<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg"><rect width="200" height="200" fill="${bg}"/>${shape}</svg>`;
}

/* ---------------- content.json ----------------
   pieces (board tiles) come from "exploreimages" (title + image),
   stickers (decorative, no title, no click-to-zoom) come from
   "explorestickers" (image only). Google Drive "share" links get
   rewritten into a directly-loadable image URL. */
function toDirectImageUrl(url){
  const m = url && url.match(/\/d\/([a-zA-Z0-9_-]+)/);
  return m ? ('https://lh3.googleusercontent.com/d/' + m[1]) : url;
}

let contentData = { exploreimages: [], explorestickers: [] };
try{
  contentData = await fetch('content.json').then(r => r.json());
}catch(err){
  console.error('explore.html: could not load content.json', err);
}

const pieces = (contentData.exploreimages || []).map(item => ({
  title: item.title || '',
  image: toDirectImageUrl(item.image)
}));

const stickers = (contentData.explorestickers || []).map(item => ({
  src: toDirectImageUrl(item.image)
}));

/* find each image's true width/height so tiles can be sized to match —
   no cropping, no forced squares */
function loadAspect(url){
  return new Promise((resolve) => {
    if(!url){ resolve(1); return; }
    const img = new Image();
    img.onload = () => resolve((img.naturalWidth && img.naturalHeight) ? (img.naturalWidth / img.naturalHeight) : 1);
    img.onerror = () => resolve(1);
    img.src = url;
  });
}
await Promise.all(pieces.map(async (p) => { p.aspect = await loadAspect(p.image); }));

/* ---------------- board setup ---------------- */
const board = document.getElementById('board');
const viewport = document.getElementById('viewport');

/* the board grows with the number of pieces, so once a photo database is
   plugged in and there are many more images, they'll always have room to
   spread out instead of getting cramped into a fixed-size board */
const TARGET_CELL = 400; // ideal amount of board space reserved per tile
const gridCols = Math.max(4, Math.ceil(Math.sqrt(pieces.length * 1.3)));
const gridRows = Math.max(4, Math.ceil(pieces.length / gridCols) + 1);
const BOARD_SIZE = Math.max(2600, Math.max(gridCols, gridRows) * TARGET_CELL);

function seededRandom(seed){
  let s = seed;
  return function(){
    s = (s * 9301 + 49297) % 233280;
    return s / 233280;
  };
}
const rand = seededRandom(Math.floor(Math.random() * 233280));

/* shuffles an array in place with the seeded generator above */
function shuffle(arr){
  for(let i = arr.length - 1; i > 0; i--){
    const j = Math.floor(rand() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

const tileEls = [];

/* ---------------- cell-based scatter ----------------
   The board is divided into a grid sized to match the number of pieces.
   Each piece claims one cell (with random jitter inside it), so no matter
   how many photos get added later they'll always be spread evenly across
   the whole board instead of clumping together or overlapping. */
const cellW = BOARD_SIZE / gridCols;
const cellH = BOARD_SIZE / gridRows;
const cells = [];
for(let gy = 0; gy < gridRows; gy++){
  for(let gx = 0; gx < gridCols; gx++){
    const cx = gx * cellW + cellW / 2;
    const cy = gy * cellH + cellH / 2;
    const dist = Math.hypot(cx - BOARD_SIZE / 2, cy - BOARD_SIZE / 2);
    cells.push({ gx, gy, dist });
  }
}
cells.sort((a, b) => a.dist - b.dist);

const CENTER_COUNT = Math.min(5, Math.max(pieces.length >= 3 ? 3 : pieces.length, 0));

/* first CENTER_COUNT pieces sit on a ring around the centered quote,
   just outside its text box, instead of on top of it */
const RING_RADIUS = 400;
const ringAngleStep = (Math.PI * 2) / Math.max(1, CENTER_COUNT);
const ringAngleOffset = rand() * Math.PI * 2;
const ringPositions = [];
for(let i = 0; i < CENTER_COUNT; i++){
  const angle = ringAngleOffset + i * ringAngleStep + (rand() - 0.5) * (ringAngleStep * 0.3);
  const radius = RING_RADIUS + (rand() - 0.5) * 70;
  ringPositions.push({
    cx: BOARD_SIZE / 2 + Math.cos(angle) * radius,
    cy: BOARD_SIZE / 2 + Math.sin(angle) * radius
  });
}

/* cells too close to the ring are excluded from the pool used for the
   remaining pieces, so nothing crowds the text or the ring images */
const EXCLUDE_RADIUS = RING_RADIUS + 220;
let outerCells = shuffle(cells.filter(c => c.dist > EXCLUDE_RADIUS));
if(outerCells.length === 0) outerCells = shuffle(cells.slice());

pieces.forEach((p, i) => {
  const size = 300 + Math.floor(rand() * 40);
  const h = size / (p.aspect || 1);
  let x, y;
  if(i < CENTER_COUNT){
    x = ringPositions[i].cx - size / 2;
    y = ringPositions[i].cy - h / 2;
  } else {
    const cell = outerCells[(i - CENTER_COUNT) % outerCells.length];
    const cellX = cell.gx * cellW;
    const cellY = cell.gy * cellH;
    x = Math.min(BOARD_SIZE - size, Math.max(0, cellX + rand() * Math.max(0, cellW - size)));
    y = Math.min(BOARD_SIZE - h, Math.max(0, cellY + rand() * Math.max(0, cellH - h)));
  }
  const rot = (rand() * 8 - 4).toFixed(2);

  const el = document.createElement('figure');
  el.className = 'tile';
  el.style.width = size + 'px';
  el.style.height = h + 'px';
  el.style.left = x + 'px';
  el.style.top = y + 'px';
  el.style.setProperty('--rot', rot + 'deg');
  el.style.margin = '0';
  el.dataset.x = x; el.dataset.y = y; el.dataset.rot = rot;
  const safeTitle = (p.title || '').replace(/"/g, '&quot;');
  const art = p.image
    ? `<img src="${p.image}" alt="${safeTitle}" draggable="false">`
    : svgTile(i);
  el.innerHTML = art + `<figcaption>${p.title || ''}</figcaption>`;
  el.dataset.title = p.title || '';
  el.dataset.image = p.image || '';
  el.dataset.seed = i;

  board.appendChild(el);
  tileEls.push(el);
});

/* ---------------- decorative stickers ----------------
   placed on top of the board, freely (not confined to the grid cells so
   they can overlap tiles the way a real scrap-journal sticker would) */
const stickerEls = [];
stickers.forEach((s) => {
  const size = s.size || 120;
  const x = (typeof s.x === 'number') ? s.x : rand() * Math.max(0, BOARD_SIZE - size);
  const y = (typeof s.y === 'number') ? s.y : rand() * Math.max(0, BOARD_SIZE - size);
  const rot = (typeof s.rot === 'number') ? s.rot : (rand() * 16 - 8).toFixed(2);

  const el = document.createElement('div');
  el.className = 'sticker';
  el.style.width = size + 'px';
  el.style.left = x + 'px';
  el.style.top = y + 'px';
  el.style.setProperty('--rot', rot + 'deg');
  el.style.margin = '0';
  el.dataset.x = x; el.dataset.y = y;
  el.innerHTML = `<img src="${s.src}" alt="" draggable="false">`;

  board.appendChild(el);
  stickerEls.push(el);
});

/* ---------------- center quote ----------------
   sits at the exact mathematical center of the board, regardless of
   board size or how many pieces are on it */
const quoteEl = document.createElement('div');
quoteEl.className = 'board-quote';
quoteEl.style.left = (BOARD_SIZE / 2) + 'px';
quoteEl.style.top = (BOARD_SIZE / 2) + 'px';
quoteEl.style.transform = 'translate(-50%, -50%)';
board.appendChild(quoteEl);

/* typewriter loop: types text A, pauses, erases, types text B, pauses, erases, repeats
   texts come from content.json "explorequotes" */
const quoteTexts = (contentData.explorequotes && contentData.explorequotes.length)
  ? contentData.explorequotes
  : ['each work is an opportunity to explore ideas freely, while learning new skills, techniques, and ways of thinking, embodying a spontaneous and open-ended process.'];
const TYPE_SPEED = 35;        // ms per character while typing
const ERASE_SPEED = 20;       // ms per character while erasing
const HOLD_AFTER_TYPE = 1800; // ms to pause once fully typed
const HOLD_AFTER_ERASE = 400; // ms to pause once fully erased

let quoteIndex = 0;
let charIndex = 0;

function typewriterStep(){
  const full = quoteTexts[quoteIndex];

  if(charIndex <= full.length){
    quoteEl.textContent = full.slice(0, charIndex);
    charIndex++;
    setTimeout(typewriterStep, TYPE_SPEED);
  } else {
    setTimeout(eraseStep, HOLD_AFTER_TYPE);
  }
}

function eraseStep(){
  const full = quoteTexts[quoteIndex];

  if(charIndex > 0){
    charIndex--;
    quoteEl.textContent = full.slice(0, charIndex);
    setTimeout(eraseStep, ERASE_SPEED);
  } else {
    quoteIndex = (quoteIndex + 1) % quoteTexts.length;
    setTimeout(typewriterStep, HOLD_AFTER_ERASE);
  }
}

typewriterStep();

/* ---------------- pan (viewport) + zoom-out on wheel ---------------- */
let panX = -(BOARD_SIZE/2) + window.innerWidth/2;
let panY = -(BOARD_SIZE/2) + window.innerHeight/2;
let scale = 1;
const MIN_SCALE = 0.45, MAX_SCALE = 1.8;
const EDGE_MARGIN = 220; // how far past the board edge the user can pan

function clampPan(){
  const scaled = BOARD_SIZE * scale;
  let loX = window.innerWidth - scaled - EDGE_MARGIN;
  let hiX = EDGE_MARGIN;
  if(loX > hiX){ const mid=(loX+hiX)/2; loX=hiX=mid; }
  let loY = window.innerHeight - scaled - EDGE_MARGIN;
  let hiY = EDGE_MARGIN;
  if(loY > hiY){ const mid=(loY+hiY)/2; loY=hiY=mid; }
  panX = Math.min(hiX, Math.max(loX, panX));
  panY = Math.min(hiY, Math.max(loY, panY));
}

function applyBoardTransform(){
  clampPan();
  board.style.transform = `translate(${panX}px, ${panY}px) scale(${scale})`;
}
applyBoardTransform();

function zoomAt(cx, cy, newScale){
  const prevScale = scale;
  scale = Math.min(MAX_SCALE, Math.max(MIN_SCALE, newScale));
  panX = cx - ((cx - panX) / prevScale) * scale;
  panY = cy - ((cy - panY) / prevScale) * scale;
  applyBoardTransform();
}

let isPanning = false;
let lastPanPoint = null;

/* ---------------- multi-touch (pinch-zoom / two-finger pan) ---------------- */
const activeTouches = new Map(); // pointerId -> {x, y}

function touchDistance(){
  const pts = [...activeTouches.values()];
  return Math.hypot(pts[0].x - pts[1].x, pts[0].y - pts[1].y);
}
function touchMidpoint(){
  const pts = [...activeTouches.values()];
  return { x: (pts[0].x + pts[1].x) / 2, y: (pts[0].y + pts[1].y) / 2 };
}

/* single finger/pointer drag on empty board = pans the board;
   two simultaneous pointers (pinch/two-finger touch) pans + zooms instead */
viewport.addEventListener('pointerdown', (e) => {
  activeTouches.set(e.pointerId, {x:e.clientX, y:e.clientY});
  try{ viewport.setPointerCapture(e.pointerId); }catch(err){}

  if(activeTouches.size >= 2){
    // a second finger just landed: cancel any in-progress single-finger pan and
    // switch to pinch-zoom / two-finger pan mode
    isPanning = false;
    lastPanPoint = null;
    // reset pinch tracking so the next move computes deltas from a fresh baseline
    viewport._lastPinchDist = null;
    viewport._lastPinchMid = null;
    return;
  }

  if(e.target.closest('.tile')) return;

  isPanning = true;
  lastPanPoint = {x:e.clientX, y:e.clientY};
});
viewport.addEventListener('pointermove', (e) => {
  if(activeTouches.has(e.pointerId)){
    activeTouches.set(e.pointerId, {x:e.clientX, y:e.clientY});
  }

  if(activeTouches.size >= 2){
    const rect = viewport.getBoundingClientRect();
    const mid = touchMidpoint();
    const dist = touchDistance();

    // move: shift pan by however far the midpoint itself has traveled since
    // the last frame (this is what makes a two-finger drag with no change
    // in finger spread pan the board instead of doing nothing)
    if(viewport._lastPinchMid){
      panX += mid.x - viewport._lastPinchMid.x;
      panY += mid.y - viewport._lastPinchMid.y;
    }

    // zoom: ratio of finger-spread change since the last move drives the
    // scale, anchored on the (already-panned) live midpoint
    if(dist > 0 && viewport._lastPinchDist){
      const targetScale = scale * (dist / viewport._lastPinchDist);
      zoomAt(mid.x - rect.left, mid.y - rect.top, targetScale);
    } else {
      applyBoardTransform();
    }

    viewport._lastPinchDist = dist;
    viewport._lastPinchMid = mid;
    return;
  }

  if(!isPanning || !lastPanPoint) return;
  panX += e.clientX - lastPanPoint.x;
  panY += e.clientY - lastPanPoint.y;
  lastPanPoint = {x:e.clientX, y:e.clientY};
  applyBoardTransform();
});
function releaseTouch(e){
  activeTouches.delete(e.pointerId);
  if(activeTouches.size < 2){
    viewport._lastPinchDist = null;
    viewport._lastPinchMid = null;
  }
  if(activeTouches.size === 0){
    isPanning = false;
    lastPanPoint = null;
  }
}
viewport.addEventListener('pointerup', releaseTouch);
viewport.addEventListener('pointercancel', releaseTouch);

/* trackpad: two-finger scroll pans the board, pinch (ctrlKey) zooms it */
viewport.addEventListener('wheel', (e) => {
  e.preventDefault();

  if(e.ctrlKey){
    // pinch gesture on trackpads is reported as wheel + ctrlKey
    const rect = viewport.getBoundingClientRect();
    const cx = e.clientX - rect.left;
    const cy = e.clientY - rect.top;
    zoomAt(cx, cy, scale - e.deltaY * 0.012);
  } else {
    // two-finger scroll = pan
    panX -= e.deltaX;
    panY -= e.deltaY;
    applyBoardTransform();
  }
}, {passive:false});

/* ---------------- per-tile drag + click-to-zoom + inertia physics ---------------- */
const FRICTION = 0.945;
const BOUNCE_DAMP = 0.5;
const MIN_VELOCITY = 0.06;

function cancelInertia(el){
  if(el._inertiaId){
    cancelAnimationFrame(el._inertiaId);
    el._inertiaId = null;
  }
}

function startInertia(el, vx, vy){
  const size = parseFloat(el.style.width);
  const maxX = BOARD_SIZE - size;
  const maxY = BOARD_SIZE - size;

  function step(){
    let x = parseFloat(el.dataset.x);
    let y = parseFloat(el.dataset.y);
    x += vx; y += vy;

    if(x < 0){ x = 0; vx = -vx * BOUNCE_DAMP; playBounce(); }
    else if(x > maxX){ x = maxX; vx = -vx * BOUNCE_DAMP; playBounce(); }
    if(y < 0){ y = 0; vy = -vy * BOUNCE_DAMP; playBounce(); }
    else if(y > maxY){ y = maxY; vy = -vy * BOUNCE_DAMP; playBounce(); }

    vx *= FRICTION; vy *= FRICTION;
    el.style.left = x + 'px';
    el.style.top = y + 'px';
    el.dataset.x = x; el.dataset.y = y;

    if(Math.hypot(vx, vy) > MIN_VELOCITY){
      el._inertiaId = requestAnimationFrame(step);
    } else {
      el._inertiaId = null;
    }
  }

  cancelInertia(el);
  el._inertiaId = requestAnimationFrame(step);
}

tileEls.forEach(el => {
  let dragging = false;
  let moved = false;
  let start = {x:0,y:0};
  let origin = {x:0,y:0};
  let trail = []; // recent {x,y,t} samples, used to compute release velocity

  el.addEventListener('pointerdown', (e) => {
    e.stopPropagation();
    cancelInertia(el);
    el.style.transition = '';
    dragging = true; moved = false;
    start = {x:e.clientX, y:e.clientY};
    origin = {x:parseFloat(el.dataset.x), y:parseFloat(el.dataset.y)};
    trail = [{x:origin.x, y:origin.y, t:performance.now()}];
    el.setPointerCapture(e.pointerId);
    el.classList.add('dragging');
  });

  el.addEventListener('pointermove', (e) => {
    if(!dragging) return;
    const dx = (e.clientX - start.x) / scale;
    const dy = (e.clientY - start.y) / scale;
    if(Math.abs(dx) > 4 || Math.abs(dy) > 4) moved = true;
    const nx = origin.x + dx;
    const ny = origin.y + dy;
    el.style.left = nx + 'px';
    el.style.top = ny + 'px';
    el.dataset.x = nx; el.dataset.y = ny;

    trail.push({x:nx, y:ny, t:performance.now()});
    if(trail.length > 6) trail.shift();
  });

  el.addEventListener('pointerup', (e) => {
    dragging = false;
    el.classList.remove('dragging');
    if(!moved){
      openZoom(el);
      return;
    }

    /* release velocity comes from the recent drag trail, so a fast flick
       keeps sliding while a slow, deliberate drop just settles in place */
    if(trail.length >= 2){
      const first = trail[0];
      const last = trail[trail.length - 1];
      const dt = Math.max(16, last.t - first.t);
      const vx = ((last.x - first.x) / dt) * 16;
      const vy = ((last.y - first.y) / dt) * 16;
      if(Math.hypot(vx, vy) > MIN_VELOCITY){
        startInertia(el, vx, vy);
      }
    }
  });

  el.addEventListener('pointercancel', () => {
    dragging = false;
    el.classList.remove('dragging');
  });
});

/* ---------------- sticker drag (no click-to-zoom, purely decorative) ---------------- */
stickerEls.forEach(el => {
  let dragging = false;
  let start = {x:0,y:0};
  let origin = {x:0,y:0};
  let trail = [];

  el.addEventListener('pointerdown', (e) => {
    e.stopPropagation();
    cancelInertia(el);
    el.style.transition = '';
    dragging = true;
    start = {x:e.clientX, y:e.clientY};
    origin = {x:parseFloat(el.dataset.x), y:parseFloat(el.dataset.y)};
    trail = [{x:origin.x, y:origin.y, t:performance.now()}];
    el.setPointerCapture(e.pointerId);
    el.classList.add('dragging');
  });

  el.addEventListener('pointermove', (e) => {
    if(!dragging) return;
    const dx = (e.clientX - start.x) / scale;
    const dy = (e.clientY - start.y) / scale;
    const nx = origin.x + dx;
    const ny = origin.y + dy;
    el.style.left = nx + 'px';
    el.style.top = ny + 'px';
    el.dataset.x = nx; el.dataset.y = ny;

    trail.push({x:nx, y:ny, t:performance.now()});
    if(trail.length > 6) trail.shift();
  });

  el.addEventListener('pointerup', () => {
    dragging = false;
    el.classList.remove('dragging');
    if(trail.length >= 2){
      const first = trail[0];
      const last = trail[trail.length - 1];
      const dt = Math.max(16, last.t - first.t);
      const vx = ((last.x - first.x) / dt) * 16;
      const vy = ((last.y - first.y) / dt) * 16;
      if(Math.hypot(vx, vy) > MIN_VELOCITY){
        startInertia(el, vx, vy);
      }
    }
  });

  el.addEventListener('pointercancel', () => {
    dragging = false;
    el.classList.remove('dragging');
  });
});

/* ---------------- zoom overlay ---------------- */
const overlay = document.getElementById('overlay');
const overlayViewport = document.getElementById('overlayViewport');
const overlayFrame = document.getElementById('overlayFrame');
const overlayCaption = document.getElementById('overlayCaption');

/* pan/zoom state for the image inside the popup — separate from the
   board's own pan/zoom (scale, panX, panY above) */
const OVERLAY_ZOOM_MIN = 1;
const OVERLAY_ZOOM_MAX = 4;
const OVERLAY_ZOOM_STEP = 0.5;
let overlayZoom = 1;
let overlayPanX = 0;
let overlayPanY = 0;

function clampOverlayPan(){
  const rect = overlayViewport.getBoundingClientRect();
  const maxX = Math.max(0, (rect.width * (overlayZoom - 1)) / 2);
  const maxY = Math.max(0, (rect.height * (overlayZoom - 1)) / 2);
  overlayPanX = Math.min(maxX, Math.max(-maxX, overlayPanX));
  overlayPanY = Math.min(maxY, Math.max(-maxY, overlayPanY));
}

function applyOverlayTransform(){
  clampOverlayPan();
  overlayFrame.style.transform = `translate(${overlayPanX}px, ${overlayPanY}px) scale(${overlayZoom})`;
  overlayViewport.classList.toggle('zoomed', overlayZoom > OVERLAY_ZOOM_MIN);
}

function setOverlayZoom(z){
  overlayZoom = Math.min(OVERLAY_ZOOM_MAX, Math.max(OVERLAY_ZOOM_MIN, z));
  if(overlayZoom === OVERLAY_ZOOM_MIN){ overlayPanX = 0; overlayPanY = 0; }
  applyOverlayTransform();
}

function resetOverlayZoom(){
  overlayZoom = OVERLAY_ZOOM_MIN;
  overlayPanX = 0;
  overlayPanY = 0;
  overlayFrame.style.transform = 'translate(0px, 0px) scale(1)';
  overlayViewport.classList.remove('zoomed');
}

function openZoom(el){
  const image = el.dataset.image;
  const safeTitle = (el.dataset.title || '').replace(/"/g, '&quot;');
  overlayFrame.innerHTML = image
    ? `<img src="${image}" alt="${safeTitle}">`
    : svgTile(parseInt(el.dataset.seed));
  overlayCaption.textContent = el.dataset.title;
  resetOverlayZoom();
  overlay.classList.add('open');
}
function closeZoom(){
  overlay.classList.remove('open');
  resetOverlayZoom();
}
document.getElementById('overlayClose').addEventListener('click', closeZoom);
overlay.addEventListener('click', (e) => {
  if(e.target === overlay) closeZoom();
});
document.addEventListener('keydown', (e) => {
  if(e.key === 'Escape') closeZoom();
});

/* zoom in/out buttons */
document.getElementById('overlayZoomIn').addEventListener('click', (e) => {
  e.stopPropagation();
  setOverlayZoom(overlayZoom + OVERLAY_ZOOM_STEP);
});
document.getElementById('overlayZoomOut').addEventListener('click', (e) => {
  e.stopPropagation();
  setOverlayZoom(overlayZoom - OVERLAY_ZOOM_STEP);
});

/* scroll / trackpad pinch to zoom the popped-up image */
overlayViewport.addEventListener('wheel', (e) => {
  e.preventDefault();
  e.stopPropagation();
  setOverlayZoom(overlayZoom - e.deltaY * 0.0016 * overlayZoom);
}, {passive:false});

/* double-click / double-tap toggles between fit and a closer zoom */
overlayViewport.addEventListener('dblclick', (e) => {
  e.stopPropagation();
  setOverlayZoom(overlayZoom > OVERLAY_ZOOM_MIN ? OVERLAY_ZOOM_MIN : 2.2);
});

/* drag to pan once zoomed in */
let overlayDragging = false;
let overlayDragStart = {x:0, y:0};
let overlayPanStart = {x:0, y:0};
overlayViewport.addEventListener('pointerdown', (e) => {
  if(overlayZoom <= OVERLAY_ZOOM_MIN) return;
  e.stopPropagation();
  overlayDragging = true;
  overlayViewport.classList.add('dragging');
  overlayDragStart = {x:e.clientX, y:e.clientY};
  overlayPanStart = {x:overlayPanX, y:overlayPanY};
  overlayViewport.setPointerCapture(e.pointerId);
});
overlayViewport.addEventListener('pointermove', (e) => {
  if(!overlayDragging) return;
  overlayPanX = overlayPanStart.x + (e.clientX - overlayDragStart.x);
  overlayPanY = overlayPanStart.y + (e.clientY - overlayDragStart.y);
  applyOverlayTransform();
});
function endOverlayDrag(){
  overlayDragging = false;
  overlayViewport.classList.remove('dragging');
}
overlayViewport.addEventListener('pointerup', endOverlayDrag);
overlayViewport.addEventListener('pointercancel', endOverlayDrag);

/* ---------------- toolbar: zoom ---------------- */
document.getElementById('zoomInBtn').addEventListener('click', () => {
  zoomAt(window.innerWidth/2, window.innerHeight/2, scale + 0.18);
});
document.getElementById('zoomOutBtn').addEventListener('click', () => {
  zoomAt(window.innerWidth/2, window.innerHeight/2, scale - 0.18);
});

window.addEventListener('resize', () => {
  applyBoardTransform();
});
})();
</script>

<!-- ============ PAGE ENTRANCE ANIMATION ============ -->
<!-- Subtle fade-up on every load: header, board viewport, and the zoom       -->
<!-- toolbar rise ~16px into place with a short stagger. Reuses the same      -->
<!-- reveal-item/is-in classes (and reduced-motion handling) as index.html.   -->
<!-- Targets the fixed .viewport wrapper rather than the draggable #board    -->
<!-- itself, since #board already owns its own transform for panning/zoom.   -->
<script>
(function(){
  var els = Array.prototype.slice.call(document.querySelectorAll('header, #viewport, .toolbar:not(.overlay__zoom-controls)'));
  if (!els.length) return;
  els.forEach(function(el){ el.classList.add('reveal-item'); });
  // double rAF so the transition-delay is committed before we flip opacity
  requestAnimationFrame(function(){
    requestAnimationFrame(function(){
      els.forEach(function(el, i){
        el.style.transitionDelay = Math.min(i * 110, 550) + 'ms';
        el.classList.add('is-in');
      });
    });
  });
})();
</script>
<!-- ============ END PAGE ENTRANCE ANIMATION ============ -->
