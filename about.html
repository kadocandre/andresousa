<script>
  if('scrollRestoration' in history){ history.scrollRestoration = 'manual'; }

  /* ---------- SMOOTH INERTIA SCROLL ---------- */
  (function(){
    if (window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches) return;
    if ('ontouchstart' in window) return; // touch devices already have nice native momentum scroll

    let current = window.scrollY;
    let target = window.scrollY;
    const ease = 0.16; // lower = smoother/slower, higher = snappier
    const wheelMultiplier = 1.15; // a little extra energy per wheel tick
    let ticking = false;

    function maxScroll(){
      return Math.max(0, document.documentElement.scrollHeight - window.innerHeight);
    }

    function onWheel(e){
      e.preventDefault();
      target = Math.min(Math.max(target + e.deltaY * wheelMultiplier, 0), maxScroll());
      if(!ticking){ ticking = true; requestAnimationFrame(raf); }
    }

    function raf(){
      current += (target - current) * ease;
      if(Math.abs(target - current) < 0.5){
        current = target;
        window.scrollTo(0, current);
        ticking = false;
        return;
      }
      window.scrollTo(0, current);
      requestAnimationFrame(raf);
    }

    // stay in sync with scrolls we didn't cause (scrollbar drag, keyboard, back-to-top, anchor jumps, restore-on-load)
    window.addEventListener('scroll', () => {
      if(!ticking){ current = window.scrollY; target = window.scrollY; }
    }, {passive:true});

    window.addEventListener('wheel', onWheel, {passive:false});
  })();

  const topBtn = document.getElementById('topBtn');
  function toggleTopBtn(){
    if(window.scrollY > 240){ topBtn.classList.add('visible'); }
    else{ topBtn.classList.remove('visible'); }

  toggleTopBtn();
  window.addEventListener('scroll', toggleTopBtn, {passive:true});

  const menuBtn = document.getElementById('menuBtn');

    menuBtn.setAttribute('aria-expanded', 'false');
    menuBtn.textContent = '☰';
  }
  menuBtn.addEventListener('click', () => {
    const isOpen = nav.classList.toggle('open');
    menuBtn.classList.toggle('active', isOpen);
    menuBtn.setAttribute('aria-expanded', String(isOpen));
    menuBtn.textContent = isOpen ? '✕' : '☰';

  /* ---------- DRAW ON PORTRAIT ---------- */
  (function(){
    const frame = document.getElementById('portraitFrame');
    const canvas = document.getElementById('portraitCanvas');
    if(!frame || !canvas) return;
    const ctx = canvas.getContext('2d');
    const colorPicker = document.getElementById('portraitColor');
    const undoBtn = document.getElementById('portraitUndo');
    const clearBtn = document.getElementById('portraitClear');

    let dpr = Math.max(window.devicePixelRatio || 1, 1);
    let drawing = false;
    let last = null;
    let undoStack = [];

    const STORAGE_COLOR = 'portraitColor';
    const STORAGE_DRAWING = 'portraitDrawing';

    /* Safe wrappers — localStorage can throw (not just fail) in private
       browsing, sandboxed/embedded previews, some file:// contexts, etc.
       An uncaught throw here would stop this whole script before any
       drawing listeners get attached, so every read/write is guarded. */
    function storageGet(key){
      try{
        return localStorage.getItem(key);
      }catch(err){
        return null;
      }
    }
    function storageSet(key, value){
      try{
        localStorage.setItem(key, value);
        return true;
      }catch(err){
        return false;
      }
    }

    /* restore saved color */
    const savedColor = storageGet(STORAGE_COLOR);
    if(savedColor){
      colorPicker.value = savedColor;
    }

    function saveDrawing(){
      storageSet(STORAGE_DRAWING, canvas.toDataURL());
    }

    function loadSavedDrawing(){
      const dataUrl = storageGet(STORAGE_DRAWING);
      if(!dataUrl) return;
      const img = new Image();
      img.onload = () => {
        ctx.drawImage(img, 0, 0, canvas.width / dpr, canvas.height / dpr);
      };
      img.src = dataUrl;
    }

    let hasSized = false; /* true only after this function has run once —
      canvas.width/height default to 300/150 even before any sizing, so
      checking their truthiness alone can't tell "first load" from "resize" */
    function sizeCanvas(){
      const prev = hasSized
        ? ctx.getImageData(0, 0, canvas.width, canvas.height)
        : null;
      const rect = frame.getBoundingClientRect();
      dpr = Math.max(window.devicePixelRatio || 1, 1);
      canvas.width = Math.round(rect.width * dpr);
      canvas.height = Math.round(rect.height * dpr);
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      ctx.lineCap = 'round';
      ctx.lineJoin = 'round';
      ctx.lineWidth = 3;
      ctx.strokeStyle = colorPicker.value;
      if(prev){
        ctx.putImageData(prev, 0, 0);
      }else{
        loadSavedDrawing();
      }
      hasSized = true;
    }
    sizeCanvas();
    window.addEventListener('resize', sizeCanvas);

    colorPicker.addEventListener('input', (e) => {
      ctx.strokeStyle = e.target.value;
      storageSet(STORAGE_COLOR, e.target.value);
    });

    function pointFromEvent(e){
      const rect = canvas.getBoundingClientRect();
      return { x: e.clientX - rect.left, y: e.clientY - rect.top };
    }

      undoStack.push(ctx.getImageData(0, 0, canvas.width, canvas.height));
      if(undoStack.length > 30) undoStack.shift();

      drawing = true;
      pushUndo();
      last = pointFromEvent(e);
      canvas.setPointerCapture(e.pointerId);
      ctx.beginPath();
      ctx.moveTo(last.x, last.y);
      ctx.lineTo(last.x + 0.01, last.y + 0.01);
      ctx.stroke();
    });
    canvas.addEventListener('pointermove', (e) => {
      if(!drawing) return;
      const p = pointFromEvent(e);
      ctx.beginPath();
      ctx.moveTo(last.x, last.y);
      ctx.lineTo(p.x, p.y);
      ctx.stroke();
      last = p;
    });

      if(drawing) saveDrawing();
      drawing = false;
      last = null;
    }
    canvas.addEventListener('pointerup', stopDrawing);
    canvas.addEventListener('pointerleave', stopDrawing);
    canvas.addEventListener('pointercancel', stopDrawing);

    /* belt-and-braces: if the tab is backgrounded/closed mid-stroke
       without a clean pointerup, make sure the latest state is saved */
    document.addEventListener('visibilitychange', () => {
      if(document.visibilityState === 'hidden') saveDrawing();
    });
    window.addEventListener('pagehide', saveDrawing);

    undoBtn.addEventListener('click', () => {
      const prev = undoStack.pop();
      if(prev) ctx.putImageData(prev, 0, 0);
      else ctx.clearRect(0, 0, canvas.width, canvas.height);
      saveDrawing();
    });
    clearBtn.addEventListener('click', () => {
      pushUndo();
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      saveDrawing();
    });
  })();

  /* ---------- LUCKY BUTTON ARROW ORBIT ---------- */
  (function(){
    const spin = document.getElementById('arrowSpin');
    if(!spin) return;
    const CURSOR_SVG = '<svg viewBox="0 0 20 20" xmlns="http://www.w3.org/2000/svg"><path d="M3 2 L3 16.5 L7.1 12.4 L9.5 17.6 L11.8 16.5 L9.4 11.4 L14 11.4 Z"/></svg>';

    const RINGS = [
      { radius: 70,  count: 18 },
      { radius: 108, count: 28 },
      { radius: 146, count: 36 }
    ];

    RINGS.forEach(ring => {
      const STEP = 360 / ring.count;
      for(let i = 0; i < ring.count; i++){
        const angle = i * STEP;
        const angleRad = angle * Math.PI / 180;
        const tx = (ring.radius * Math.cos(angleRad)).toFixed(1);
        const ty = (ring.radius * Math.sin(angleRad)).toFixed(1);
        /* point the arrow tip inward, toward the button */
        const rot = Math.floor(angle + 270);
        const op = (0.5 + Math.random() * 0.25).toFixed(2);
        const sc = (0.9 + Math.random() * 0.2).toFixed(2);
        const pdur = (1.4 + Math.random() * 0.8).toFixed(2);   /* pulse loop duration */
        const pd = (Math.random() * 1.2).toFixed(2);           /* pulse phase offset, so they don't all pulse in unison */
        const el = document.createElement('div');
        el.className = 'cur' + (Math.random() < 0.16 ? ' accent' : '');
        el.style.setProperty('--tx', tx + 'px');
        el.style.setProperty('--ty', ty + 'px');
        el.style.setProperty('--rot', rot + 'deg');
        el.style.setProperty('--op', op);
        el.style.setProperty('--sc', sc);
        el.style.setProperty('--pdur', pdur + 's');
        el.style.setProperty('--pd', pd + 's');
        el.innerHTML = '<div class="cur-inner">' + CURSOR_SVG + '</div>';
        spin.appendChild(el);
      }
    });
  })();

</script>

<script>
  /* ---------- DYNAMIC ABOUT CONTENT (from content.json) ---------- */
  (function(){
    /* content.json stores Google Drive "share" links (…/file/d/ID/view),
       which can't be used directly as an <img> src. Convert to a
       hotlinkable form using the file ID. */
    function toDirectImageUrl(url){
      var m = url && url.match(/\/d\/([a-zA-Z0-9_-]+)/);
      return m ? ('https://lh3.googleusercontent.com/d/' + m[1]) : url;
    }

    fetch('content.json')
      .then(function(res){ return res.json(); })
      .then(function(data){

        /* intro strap line — content.json "about" */
        var introEl = document.getElementById('introText');
        if (introEl && Array.isArray(data.about) && data.about[0] && data.about[0].rightText) {
          introEl.textContent = data.about[0].rightText;
        }

        /* portrait / drawing-board background image — content.json "about" */
        var portraitImg = document.getElementById('portraitImage');
        if (portraitImg && Array.isArray(data.about) && data.about[0] && data.about[0].image) {
          portraitImg.src = toDirectImageUrl(data.about[0].image);
          portraitImg.onload = function(){ portraitImg.style.display = 'block'; };
          portraitImg.onerror = function(){
            console.warn('about.html: portrait image failed to load, showing placeholder');
          };
        }

        /* bio / education / experience blocks — content.json "aboutmaintext" */
        var bioEl = document.getElementById('aboutBio');
        if (bioEl && Array.isArray(data.aboutmaintext)) {
          data.aboutmaintext.forEach(function(block, i){
            var label = document.createElement('p');
            label.className = 'label';
            if (i > 0) label.style.marginTop = '36px';
            label.textContent = block.texttitle;
            bioEl.appendChild(label);

            var text = document.createElement('p');
            text.textContent = block.blocktext;
            bioEl.appendChild(text);
          });
        }
      })
      .catch(function(err){
        console.error('about.html: could not load content.json', err);
      });
  })();
</script>

<!-- ============ PAGE ENTRANCE ANIMATION ============ -->
<!-- Subtle fade-up on every load: header, intro, and each top-level section  -->
<!-- of <main> rise ~16px into place with a short stagger. Reuses the same    -->
<!-- reveal-item/is-in classes (and reduced-motion handling) as index.html.   -->
<script>
(function(){
  var els = Array.prototype.slice.call(document.querySelectorAll('header, .intro, main > *, footer.spacer > *'));
  if (!els.length) return;
  els.forEach(function(el){ el.classList.add('reveal-item'); });
  // double rAF so the transition-delay is committed before we flip opacity
  requestAnimationFrame(function(){
    requestAnimationFrame(function(){
      els.forEach(function(el, i){
        el.style.transitionDelay = Math.min(i * 110, 550) + 'ms';
        el.classList.add('is-in');
      });
    });
  });
})();
</script>
<!-- ============ END PAGE ENTRANCE ANIMATION ============ -->
